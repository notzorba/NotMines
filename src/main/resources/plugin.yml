name: NotMines
version: ${version}
main: io.github.notzorba.notmines.NotMinesPlugin
description: High-performance mines gambling plugin with Vault economy support.
author: NotZorba
website: https://github.com/notzorba
api-version: '1.20.5'
prefix: NotMines
softdepend: [Vault]
load: POSTWORLD

commands:
  mines:
    description: Start or manage a mines game.
    usage: /mines <bet> <mines> or /mines <subcommand>
    aliases: [minegame]
    permission: notmines.use

permissions:
  notmines.use:
    description: Allows a player to use mines games and view their own stats.
    default: true
  notmines.stats.others:
    description: Allows viewing mines stats for other players.
    default: op
  notmines.admin:
    description: Allows viewing and updating NotMines limits in game.
    default: op
