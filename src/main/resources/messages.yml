prefix: "<#F97352><bold>Mines</bold></#F97352> <dark_gray>▶</dark_gray>"

general:
  players-only: "<prefix> <#E85D75>Only players can use that command.</#E85D75>"
  no-permission: "<prefix> <#E85D75>You do not have permission to do that.</#E85D75>"
  economy-missing: "<prefix> <#E85D75>Vault or a hooked economy provider was not found, so NotMines cannot start.</#E85D75>"
  game-opening: "<prefix> <gray>Opening your board with <white><bet></white> and <white><mines></white> mine(s)...</gray>"
  active-game-reminder: "<prefix> <#F4C95D>You already have an active board. Use <white>/mines reopen</white> or <white>/mines cashout</white>.</#F4C95D>"
  board-closed: "<prefix> <gray>Your board is still active. Use <white>/mines reopen</white> or <white>/mines cashout</white>.</gray>"
  stats-loading: "<prefix> <gray>Loading mines stats...</gray>"

command:
  help:
    - "<prefix> <white>/mines <bet> <mines></white> <gray>- Start a new board. Bets accept <white>1k</white>, <white>1.5m</white>, and <white>2b</white>.</gray>"
    - "<prefix> <white>/mines cashout</white> <gray>- Take the current payout.</gray>"
    - "<prefix> <white>/mines reopen</white> <gray>- Reopen your active board.</gray>"
    - "<prefix> <white>/mines stats [player]</white> <gray>- View mines statistics.</gray>"
  help-admin:
    - "<prefix> <white>/mines limits</white> <gray>- Show the live bet and mine limits.</gray>"
    - "<prefix> <white>/mines limits <limit> <value></white> <gray>- Update <white>min-bet</white>, <white>max-bet</white>, <white>min-mines</white>, or <white>max-mines</white>.</gray>"
    - "<prefix> <white>/mines reload</white> <gray>- Reload config, GUI, and messages without restarting.</gray>"
  invalid-bet-format: "<prefix> <#E85D75><value></#E85D75> <gray>is not a valid bet. Try values like <white>1000</white>, <white>1k</white>, <white>1.5m</white>, or <white>2b</white>.</gray>"
  invalid-mines-format: "<prefix> <#E85D75><value></#E85D75> <gray>is not a valid mine count.</gray>"
  invalid-bet: "<prefix> <#E85D75>The bet must be between <min> and <max>.</#E85D75>"
  invalid-mines: "<prefix> <#E85D75>The mine count must be between <min> and <max>.</#E85D75>"
  cashout-empty: "<prefix> <#E85D75>You do not have an active board to cash out.</#E85D75>"
  reopen-empty: "<prefix> <#E85D75>You do not have an active board to reopen.</#E85D75>"
  already-started: "<prefix> <#E85D75>Finish or cash out your current board before starting another one.</#E85D75>"
  limits-usage:
    - "<prefix> <gray>Use <white>/mines limits</white> to view the current limits.</gray>"
    - "<prefix> <gray>Use <white>/mines limits <limit> <value></white> to update <white>min-bet</white>, <white>max-bet</white>, <white>min-mines</white>, or <white>max-mines</white>.</gray>"
  limits-current:
    - "<prefix> <#4DB6AC><bold>Live Limits</bold></#4DB6AC>"
    - "<prefix> <gray>Bet range:</gray> <white><min_bet></white> <dark_gray>-</dark_gray> <white><max_bet></white>"
    - "<prefix> <gray>Mine range:</gray> <white><min_mines></white> <dark_gray>-</dark_gray> <white><max_mines></white>"
    - "<prefix> <gray>Money values also accept <white>k</white>, <white>m</white>, and <white>b</white> suffixes.</gray>"
  limit-unknown: "<prefix> <#E85D75><limit></#E85D75> <gray>is not a known limit. Use <white>min-bet</white>, <white>max-bet</white>, <white>min-mines</white>, or <white>max-mines</white>.</gray>"
  limit-updated: "<prefix> <#4DB6AC>Updated <white><limit></white> to <white><value></white>.</#4DB6AC>"
  limit-too-high: "<prefix> <#E85D75><limit></#E85D75> <gray>cannot be higher than <white><other></white> (<white><value></white>).</gray>"
  limit-too-low: "<prefix> <#E85D75><limit></#E85D75> <gray>cannot be lower than <white><other></white> (<white><value></white>).</gray>"
  reload-success: "<prefix> <#4DB6AC>Reloaded config, GUI, and messages.</#4DB6AC>"
  reload-failed: "<prefix> <#E85D75>Reload failed:</#E85D75> <gray><reason></gray>"

economy:
  insufficient-funds: "<prefix> <#E85D75>You need <required> to start that board.</#E85D75>"
  withdraw-failed: "<prefix> <#E85D75>Your bet could not be withdrawn right now. Try again in a moment.</#E85D75>"
  deposit-failed: "<prefix> <#E85D75>Your payout could not be completed automatically. Please contact staff.</#E85D75>"

game:
  hit-safe: "<prefix> <#4DB6AC>Safe tile!</#4DB6AC> <gray>Multiplier:</gray> <white><multiplier>x</white> <gray>Payout:</gray> <white><payout></white>"
  hit-mine: "<prefix> <#E85D75>You hit a mine and lost <bet>.</#E85D75>"
  cashed-out: "<prefix> <#4DB6AC>You cashed out for <payout></#4DB6AC> <gray>(<multiplier>x).</gray>"
  board-cleared: "<prefix> <#F4C95D>You cleared the full board for <payout></#F4C95D> <gray>(<multiplier>x).</gray>"
  forced-cashout: "<prefix> <#F4C95D>Your active board was closed safely and paid out <payout>.</#F4C95D>"
  big-win: "<prefix> <#F4C95D><player></#F4C95D> <gray>hit</gray> <white><multiplier>x</white> <gray>and won</gray> <white><payout></white> <gray>on a</gray> <white><mines></white> <gray>mine board.</gray>"

stats:
  header: "<prefix> <#7BAAF7><bold>Mines Stats</bold></#7BAAF7> <gray>for</gray> <white><player></white>"
  body:
    - "<gray>Games:</gray> <white><games></white> <dark_gray>|</dark_gray> <gray>Wins:</gray> <white><wins></white> <dark_gray>|</dark_gray> <gray>Losses:</gray> <white><losses></white>"
    - "<gray>Win Rate:</gray> <white><win_rate>%</white> <dark_gray>|</dark_gray> <gray>Tiles Cleared:</gray> <white><tiles></white>"
    - "<gray>Total Wagered:</gray> <white><wagered></white>"
    - "<gray>Total Paid Out:</gray> <white><paid_out></white>"
    - "<gray>Net Profit:</gray> <white><profit></white> <dark_gray>|</dark_gray> <gray>Best Cashout:</gray> <white><best_cashout></white>"
  missing: "<prefix> <#E85D75>No mines stats were found for <player>.</#E85D75>"
