title: "<dark_gray>Mines | GUI</dark_gray>"

layout:
  inventory-size: 54
  board-slots:
    - 2
    - 3
    - 4
    - 5
    - 6
    - 11
    - 12
    - 13
    - 14
    - 15
    - 20
    - 21
    - 22
    - 23
    - 24
    - 29
    - 30
    - 31
    - 32
    - 33
    - 38
    - 39
    - 40
    - 41
    - 42
  info-slot: 45
  stats-slot: 46
  bet-slot: 47
  cashout-slot: 49
  odds-slot: 51
  help-slot: 53

items:
  filler:
    material: BLACK_STAINED_GLASS_PANE
    title: "<dark_gray> </dark_gray>"
    lore: []

  hidden-tile:
    material: GRAY_STAINED_GLASS_PANE
    title: "<#8F9FB3>Hidden Tile</#8F9FB3>"
    lore:
      - "<gray>Click to reveal this tile.</gray>"
      - "<gray>Mines on board:</gray> <white><mines></white>"
      - "<gray>Safe chance:</gray> <white><chance>%</white>"

  safe-tile:
    material: DIAMOND
    title: "<#53B38C>Safe</#53B38C>"
    lore:
      - "<gray>This tile was safe.</gray>"
      - "<gray>Safe picks:</gray> <white><picks></white>"
      - "<gray>Current payout:</gray> <white><payout></white>"

  unrevealed-safe-tile:
    material: LIGHT_GRAY_STAINED_GLASS_PANE
    title: "<#A5AFBC>Safe Tile</#A5AFBC>"
    lore:
      - "<gray>This was safe, but unrevealed.</gray>"

  cashed-out-tile:
    material: YELLOW_STAINED_GLASS_PANE
    title: "<#D5B25C>Locked In</#D5B25C>"
    lore:
      - "<gray>You already secured the payout.</gray>"

  mine-tile:
    material: TNT
    title: "<#D96B6B>Mine</#D96B6B>"
    lore:
      - "<#E85D75>This tile contained a mine.</#E85D75>"

  cashout-active:
    material: EMERALD
    title: "<#53B38C>Cash Out</#53B38C>"
    lore:
      - "<gray>Current multiplier:</gray> <white><multiplier>x</white>"
      - "<gray>Current payout:</gray> <white><payout></white>"
      - "<gray>Click to secure this amount.</gray>"
      - "<dark_gray>Predetermined board. No tiles are rolled live.</dark_gray>"

  cashout-disabled:
    material: BARRIER
    title: "<#C97A7A>Round Ended</#C97A7A>"
    lore:
      - "<gray>This round has already ended.</gray>"

  cashout-collected:
    material: EMERALD
    title: "<#53B38C>Collected</#53B38C>"
    lore:
      - "<gray>Payout:</gray> <white><payout></white>"

  board-info-active:
    material: COMPASS
    title: "<#7C92B8>Board Status</#7C92B8>"
    lore:
      - "<gray>Safe picks:</gray> <white><safe_picks></white>"
      - "<gray>Remaining safe tiles:</gray> <white><remaining_safe></white>"
      - "<gray>Mines:</gray> <white><mines></white>"

  board-info-loss:
    material: COMPASS
    title: "<#D96B6B>Mine Hit</#D96B6B>"
    lore:
      - "<gray>Your board exploded before you could cash out.</gray>"
      - "<gray>Safe picks:</gray> <white><safe_picks></white>"

  board-info-cashout:
    material: COMPASS
    title: "<#53B38C>Paid Out</#53B38C>"
    lore:
      - "<gray>Safe picks:</gray> <white><safe_picks></white>"
      - "<gray>Final multiplier:</gray> <white><multiplier>x</white>"

  bet-info:
    material: GOLD_INGOT
    title: "<#D5B25C>Bet Info</#D5B25C>"
    lore:
      - "<gray>Wager:</gray> <white><wager></white>"
      - "<gray>Board size:</gray> <white><board_size> tiles</white>"
      - "<gray>Player:</gray> <white><player></white>"

  odds-info-active:
    material: CLOCK
    title: "<#8E88D6>Odds</#8E88D6>"
    lore:
      - "<gray>Current multiplier:</gray> <white><multiplier>x</white>"
      - "<gray>Next safe chance:</gray> <white><chance>%</white>"
      - "<gray>Cash out anytime to lock in profit.</gray>"

  odds-info-loss:
    material: PAPER
    title: "<#A5AFBC>Payout</#A5AFBC>"
    lore:
      - "<gray>This round paid:</gray> <white>0</white>"

  odds-info-cashout:
    material: PAPER
    title: "<#A5AFBC>House Edge</#A5AFBC>"
    lore:
      - "<gray>Calculated server-side from safe-pick odds.</gray>"

  help:
    material: BOOK
    title: "<#C7A768>Quick Help</#C7A768>"
    lore:
      - "<gray>/mines cashout</gray> <white>to claim your current payout</white>"
      - "<gray>/mines reopen</gray> <white>to reopen this board</white>"
      - "<gray>Closing the menu does not forfeit the board.</gray>"

  stats-loading:
    material: NETHER_STAR
    title: "<#7588A6>Your Stats</#7588A6>"
    lore:
      - "<gray>Loading your profile snapshot...</gray>"
      - "<dark_gray>This button is informational only.</dark_gray>"

  stats-loaded:
    material: NETHER_STAR
    title: "<#7588A6>Your Stats</#7588A6>"
    lore:
      - "<gray>Games:</gray> <white><games></white> <dark_gray>|</dark_gray> <gray>Wins:</gray> <white><wins></white>"
      - "<gray>Losses:</gray> <white><losses></white> <dark_gray>|</dark_gray> <gray>Win Rate:</gray> <white><win_rate>%</white>"
      - "<gray>Total Wagered:</gray> <white><wagered></white>"
      - "<gray>Total Paid:</gray> <white><paid></white>"
      - "<gray>Net Profit:</gray> <white><profit></white>"
      - "<gray>Best Cashout:</gray> <white><best_cashout></white>"
      - "<gray>Biggest Bet:</gray> <white><biggest_bet></white>"
      - "<gray>Tiles Cleared:</gray> <white><tiles></white>"
      - "<dark_gray>This button is informational only.</dark_gray>"

leaderboard:
  title: "<dark_gray>Mines | Leaderboard</dark_gray>"

  layout:
    inventory-size: 54
    entry-slots:
      - 10
      - 11
      - 12
      - 13
      - 14
      - 15
      - 16
      - 19
      - 20
      - 21
      - 22
      - 23
      - 24
      - 25
      - 28
      - 29
      - 30
      - 31
      - 32
      - 33
      - 34
      - 37
      - 38
      - 39
      - 40
      - 41
      - 42
      - 43
    summary-slot: 4
    filter-slot: 49
    previous-page-slot: 47
    next-page-slot: 51
    page-info-slot: 53
    close-slot: 45

  items:
    filler:
      material: BLACK_STAINED_GLASS_PANE
      title: "<dark_gray> </dark_gray>"
      lore: []

    summary:
      material: COMPARATOR
      title: "<#F4C95D><bold>Mines Leaders</bold></#F4C95D>"
      lore:
        - "<gray>Sorting by:</gray> <white><stat></white>"
        - "<gray>Tracked players:</gray> <white><players></white>"
        - "<gray>Showing ranks:</gray> <white><from_rank></white> <dark_gray>-</dark_gray> <white><to_rank></white>"

    filter:
      material: HOPPER
      title: "<#7BAAF7>Stat Filter</#7BAAF7>"
      lore:
        - "<gray>Current stat:</gray> <white><stat></white>"
        - "<gray>Next stat:</gray> <white><next_stat></white>"
        - "<dark_gray>Click to cycle the leaderboard sort.</dark_gray>"

    loading:
      material: CLOCK
      title: "<#7BAAF7>Loading Leaders</#7BAAF7>"
      lore:
        - "<gray>Fetching the <white><stat></white> rankings...</gray>"
        - "<dark_gray>Stats are sorted asynchronously.</dark_gray>"

    empty:
      material: PAPER
      title: "<#D5B25C>No Ranked Players Yet</#D5B25C>"
      lore:
        - "<gray>No completed rounds are recorded for</gray>"
        - "<white><stat></white><gray>.</gray>"

    entry:
      material: PLAYER_HEAD
      title: "<#F5F7FA>#<rank> <player></#F5F7FA>"
      lore:
        - "<gray>Selected stat:</gray> <white><stat></white>"
        - "<gray>Value:</gray> <white><value></white>"
        - "<gray>Games:</gray> <white><games></white> <dark_gray>|</dark_gray> <gray>Wins:</gray> <white><wins></white> <dark_gray>|</dark_gray> <gray>Win Rate:</gray> <white><win_rate>%</white>"
        - "<gray>Profit:</gray> <white><profit></white>"
        - "<gray>Best Cashout:</gray> <white><best_cashout></white> <dark_gray>|</dark_gray> <gray>Biggest Bet:</gray> <white><biggest_bet></white>"
        - "<gray>Total Wagered:</gray> <white><wagered></white>"
        - "<gray>Total Paid:</gray> <white><paid></white> <dark_gray>|</dark_gray> <gray>Tiles:</gray> <white><tiles></white>"

    focused-entry:
      material: PLAYER_HEAD
      title: "<#F5F7FA>#<rank> <player></#F5F7FA>"
      lore:
        - "<gray><stat>:</gray> <white><value></white>"
        - "<dark_gray>Sorted by the active hopper filter.</dark_gray>"

    previous-page:
      material: ARROW
      title: "<#A5AFBC>Previous Page</#A5AFBC>"
      lore:
        - "<gray>Current page:</gray> <white><page></white> <dark_gray>/</dark_gray> <white><pages></white>"

    next-page:
      material: ARROW
      title: "<#A5AFBC>Next Page</#A5AFBC>"
      lore:
        - "<gray>Current page:</gray> <white><page></white> <dark_gray>/</dark_gray> <white><pages></white>"

    page-info:
      material: BOOK
      title: "<#7C92B8>Page <page>/<pages></#7C92B8>"
      lore:
        - "<gray>Total ranked players:</gray> <white><entries></white>"

    close:
      material: BARRIER
      title: "<#D96B6B>Close</#D96B6B>"
      lore:
        - "<gray>Close the leaderboard menu.</gray>"
